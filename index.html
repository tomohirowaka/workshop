<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3/5 識学×EVeM ハイブリッドマネジメント研修</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --shikigaku: #1a365d;
    --evem: #065f46;
    --igi: #c2410c;
    --bg: #fafaf9;
    --text: #1c1917;
    --text-light: #57534e;
    --font: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  html { font-size: 16px; }
  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 600px;
    width: 90%;
    padding: 3rem 0;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: .5rem;
    color: var(--shikigaku);
  }
  .date {
    font-size: .9rem;
    color: var(--text-light);
    margin-bottom: 2.5rem;
  }
  .card {
    display: block;
    text-decoration: none;
    color: var(--text);
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 1.5rem 1.8rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }
  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: .3rem;
  }
  .card-desc {
    font-size: .85rem;
    color: var(--text-light);
    line-height: 1.6;
  }
  .tag {
    display: inline-block;
    font-size: .7rem;
    font-weight: 600;
    padding: .15rem .5rem;
    border-radius: 4px;
    margin-bottom: .5rem;
  }
  .tag-shikigaku { background: #dbeafe; color: var(--shikigaku); }
  .tag-evem { background: #d1fae5; color: var(--evem); }
  .tag-workshop { background: #ffedd5; color: var(--igi); }
  .footer {
    margin-top: 2rem;
    font-size: .75rem;
    color: var(--text-light);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>識学 × EVeM ハイブリッドマネジメント研修</h1>
  <p class="date">2026年3月5日（木）</p>

  <a href="presentation.html" class="card">
    <span class="tag tag-shikigaku">プレゼン</span>
    <div class="card-title">プレゼンテーション資料</div>
    <div class="card-desc">全11スライド。キーボード ← → またはスワイプで操作。識学・EVeM・意義層の3軸フレームワーク解説。</div>
  </a>

  <a href="handout.html" class="card">
    <span class="tag tag-evem">配布資料</span>
    <div class="card-title">配布資料（A4印刷対応）</div>
    <div class="card-desc">用語集（識学/EVeM/心理学）、学術ソース10件、6原則、オンボーディング頻度表。印刷して当日配布用。</div>
  </a>

  <a href="workshop.html" class="card">
    <span class="tag tag-workshop">ワーク</span>
    <div class="card-title">マネ型サーチBox ワークシート</div>
    <div class="card-desc">モバイル対応のインタラクティブワークシート。3分タイマー、インパクト/ゼロトグル付き。</div>
  </a>

  <div class="footer">若林歯科 — 医療法人 崇紘会</div>
</div>
</body>
</html>
